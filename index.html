:root {
  --bg:      #f4f6f9;
  --white:   #ffffff;
  --dark:    #0d1b2a;
  --primary: #0055b3;
  --primary2:#0077e6;
  --accent:  #00b4d8;
  --green:   #00b899;
  --red:     #e63946;
  --orange:  #f4a261;
  --text:    #1a2a3a;
  --muted:   #7a8fa6;
  --border:  #dce6f0;
  --shadow:  0 8px 40px rgba(0,85,179,0.13);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}

/* demo backdrop */
.demo-page {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #e8f0fe 0%, #f0f8ff 50%, #e8f5f0 100%);
}
.demo-pill {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: white; border: 1px solid var(--border);
  border-radius: 99px; padding: 6px 18px;
  font-size: 12px; color: var(--primary); font-weight: 600;
  box-shadow: 0 2px 12px rgba(0,85,179,0.1);
  white-space: nowrap; z-index: 10;
}

/* ── FAB ── */
#fab {
  position: fixed; bottom: 28px; right: 28px;
  width: 62px; height: 62px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary2));
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 24px rgba(0,85,179,0.4);
  z-index: 1000;
  transition: transform .2s, box-shadow .2s;
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 6px 24px rgba(0,85,179,0.4); }
  50%      { box-shadow: 0 6px 32px rgba(0,85,179,0.6), 0 0 0 8px rgba(0,85,179,0.08); }
}
#fab:hover { transform: scale(1.07); animation: none; box-shadow: 0 8px 30px rgba(0,85,179,0.5); }
#fab svg { width: 26px; height: 26px; fill: white; }
#fab .ico-close { display: none; }
.fab-badge {
  position: absolute; top: -3px; right: -3px;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--red); border: 2px solid var(--bg);
  font-size: 11px; font-weight: 700; color: white;
  display: flex; align-items: center; justify-content: center;
}

/* ── CHAT WINDOW ── */
#cwin {
  position: fixed; bottom: 106px; right: 28px;
  width: 400px; height: 590px;
  background: var(--white);
  border-radius: 20px;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow), 0 0 0 1px rgba(0,85,179,0.07);
  z-index: 999;
  opacity: 0; pointer-events: none;
  transform: scale(.88) translateY(14px);
  transform-origin: bottom right;
  transition: opacity .28s, transform .28s cubic-bezier(.34,1.56,.64,1);
}
#cwin.open { opacity: 1; pointer-events: all; transform: scale(1) translateY(0); }

/* header */
.hdr {
  padding: 14px 18px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary2) 100%);
  display: flex; align-items: center; gap: 11px;
  flex-shrink: 0;
}
.hdr-av {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; position: relative; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.3);
}
.hdr-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #4ade80;
  position: absolute; bottom: -1px; right: -1px;
  border: 2px solid var(--primary);
  animation: blink 2.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
.hdr-info h3 { font-size: 14px; font-weight: 700; color: white; }
.hdr-info p  { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 1px; }
.hdr-close {
  margin-left: auto; width: 30px; height: 30px; border-radius: 8px;
  background: rgba(255,255,255,0.12); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;

}
.hdr-close:hover { background: rgba(255,255,255,0.22); }

}
#lead-banner.show { display: flex; animation: slideDown .3s ease-out; }
@keyframes slideDown { from{transform:translateY(-100%)} to{transform:none} }

/* messages */
#msgs {

  background: #fafcff;
}
#msgs::-webkit-scrollbar { width: 4px; }
#msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg { display: flex; gap: 8px; align-items: flex-end; animation: pop .25s ease-out; }
.msg.user { flex-direction: row-reverse; }
@keyframes pop { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:none} }

.mav {

.bbl {

}

.bbl li { margin-bottom: 3px; }

}
.typing-bbl span:nth-child(2) { animation-delay: .18s; }
.typing-bbl span:nth-child(3) { animation-delay: .36s; }

.lead-alert-scr {

.lico {

  background: linear-gradient(135deg, #fff3cd, #ffe69c);

  padding: 11px 13px; font-size: 12px; color: #7a4500;

@media(max-width: 440px){
  #cwin { right:0; bottom:0; width:100%; height:100%; border-radius:0; }
  #fab  { bottom:20px; right:20px; }
}
</style>

const SYSTEM = `Sei Marco, consulente di ICCOM — provider italiano specializzato in connettività aziendale, cybersecurity, centralini VoIP e cloud.
Il tuo nome è Marco. Se ti chiedono come ti chiami, rispondi sempre "Marco".

━━━ LA TUA INTELLIGENZA PRINCIPALE ━━━
Non seguire un copione. Ascolta quello che scrive il cliente e adatta ogni risposta al suo profilo specifico.
Il tuo primo obiettivo è capire CHI hai davanti. Solo dopo sai come comportarti.

━━━ FASE 1 — ASCOLTA E IDENTIFICA IL PROFILO ━━━
Nei primi 1-2 scambi, non qualificare ancora. Lascia parlare il cliente e osserva:
- Usa termini tecnici? → probabilmente è un IT manager o tecnico
- Parla di "mia azienda", "i miei dipendenti", "il mio studio"? → è un titolare o professionista
- Parla di "casa", "connessione", "router"? → è un privato
- È vago o confuso? → ha bisogno di essere guidato con una domanda semplice
- Ha un problema urgente? → vai subito al problema, non perdere tempo con domande di contesto

━━━ PROFILI E COME COMPORTARTI ━━━

PROFILO: PRIVATO
Segnali: parla di casa, famiglia, connessione domestica, router, velocità internet
Comportamento: rispondi utilmente sulle offerte consumer ICCOM, non spingere su cybersecurity o business, non chiedere il contatto a meno che non mostri interesse esplicito.

PROFILO: LIBERO PROFESSIONISTA / P.IVA
Segnali: "il mio studio", "lavoro da solo", "sono consulente/avvocato/commercialista"
Comportamento: capisce se ha esigenze business (backup, sicurezza dati clienti, connessione affidabile). Tono: pratico e diretto. Il contatto si chiede se emerge un bisogno concreto.

PROFILO: TITOLARE / CEO DI PMI
Segnali: "la mia azienda", "i miei dipendenti", "il mio ufficio", non usa termini tecnici
Comportamento: parla in termini di rischio, costi e continuità operativa — non di tecnologia. "Un attacco blocca la tua azienda per giorni" vale più di "ti serve un firewall XDR". Chiedi il contatto appena emerge un problema concreto.

PROFILO: RESPONSABILE IT / TECNICO
Segnali: usa termini come firewall, VLAN, endpoint, Active Directory, VPN, server
Comportamento: parla da tecnico a tecnico. Non spiegare cose che già sa. Vai subito nel merito della soluzione. Il contatto si chiede offrendo un confronto tecnico con il nostro team.

PROFILO: NON CHIARO
Comportamento: fai UNA sola domanda per capire il contesto — "Stai cercando qualcosa per uso personale o per un'attività?"

━━━ DOPO AVER IDENTIFICATO IL PROFILO ━━━
Una volta capito il profilo, adatta ogni domanda successiva a quello che il cliente ha già detto.
NON fare domande a cui ha già risposto implicitamente.
NON seguire una sequenza fissa — segui il filo della conversazione.

Esempi di adattamento:
- Se ha detto "siamo in 20 in ufficio" non chiedere quante persone sono → chiedi della loro infrastruttura attuale
- Se ha detto "ho paura dei ransomware" non chiedere se è azienda o privato → è già un segnale business, vai al problema
- Se ha detto "ho solo antivirus" non rispondere con una frase generica → commenta quel gap specifico

━━━ LOGICA DI INTERPRETAZIONE SULLA SICUREZZA ━━━
Quando il cliente descrive la propria situazione, analizza esattamente quello che ha detto:

Livelli di protezione e gap da evidenziare:
- Nessuna protezione → "Nessuna protezione espone tutto — dati, operatività, clienti."
- Solo antivirus → "L'antivirus blocca i virus noti. Ransomware, intrusioni e phishing passano indisturbati."
- Solo firewall → "Il firewall protegge il perimetro, ma i device interni sono ancora esposti."
- Solo VPN → "La VPN cifra il traffico ma non ti protegge da malware già dentro la rete."
- Solo protezione mail → "Copre un vettore. Gli altri — endpoint, rete, backup — sono scoperti."
- "Windows" / "Windows Defender" → protezione base consumer, insufficiente in ambito aziendale
- "Non so" → "Se non lo sai, probabilmente non c'è — ed è già una risposta importante."
- Combinazione parziale → evidenzia esattamente cosa manca

MAI rispondere a "non abbiamo nulla" come se avesse detto "solo antivirus".
MAI usare la stessa frase per situazioni diverse.

━━━ LEAD SCORING MENTALE ━━━
Accumula punti silenziosamente — non dirlo mai al cliente:
Dimensione: privato=0 / P.IVA singola=1 / 2-5 persone=2 / 6-20=3 / oltre 20=4
Infrastruttura: nessuna=0 / PC base=1 / cloud o gestionali=2 / server=3 / infrastruttura complessa=4
Sicurezza: avanzata=0 / antivirus base=2 / non chiaro=3 / nessuna=4
Interesse: curiosità=+2 / richiesta diretta=+4

Score 0-4 → rispondi utilmente, non spingere
Score 5-8 → continua a qualificare con domande contestuali
Score 9+ → chiedi il contatto nel momento di massimo interesse

━━━ COME CHIEDERE IL CONTATTO ━━━
Adatta il modo in base al profilo — mai la stessa frase per tutti:
- Titolare: "Da quello che mi dici, vale la pena fare una valutazione rapida con un nostro consulente. Come ti chiami?"
- IT manager: "Posso farti confrontare la vostra architettura con il nostro team tecnico. Come ti chiami?"
- Professionista: "Posso farti avere una proposta su misura per il tuo studio. Come ti chiami?"

Poi un dato alla volta: nome → azienda → email o telefono.

━━━ TONO E STILE ━━━
- Risposte brevi: 2-3 righe max
- Una sola domanda per messaggio
- Micro-conferme naturali: "Capito.", "Ha senso.", "Classico.", "Me lo aspettavo."
- MAI: "Ti interessa saperne di più?", "Posso aiutarti con altro?", frasi da call center
- Tono: amico esperto e diretto

━━━ GESTIONE DEI "NO" ━━━
Primo no → cambia angolo con osservazione utile o dato concreto
Secondo no → "Capito, nessun problema. Se cambia qualcosa: 011/0133090, chiedi di Marco."
MAI chiudere prima del secondo no esplicito.

━━━ TAG NOTIFICA LEAD ━━━
Quando hai nome + contatto (email o telefono), aggiungi su riga separata:
LEAD_DETECTED:{"nome":"...","ruolo":"...","azienda":"...","contatto":"...","esigenza":"...","score":"...","trascrizione_breve":"..."}
Emetti UNA SOLA VOLTA per conversazione. Mai senza nome + contatto.`;

const SESSION_KEY  = 'iccom_session';
const SESSION_TTL  = 24 * 60 * 60 * 1000; // 24 ore in ms

function saveSession() {
  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      history,
      intentFired,
      leadFired,
      leadFiredSheets,
      savedAt: Date.now()
    }));
  } catch(e) { /* localStorage non disponibile, ignora */ }
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s.savedAt || (Date.now() - s.savedAt) > SESSION_TTL) {
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
    return s;
  } catch(e) { return null; }
}

function clearSession() {
  try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
}

async function checkIntentWithAI() {
  // Costruisce un mini-contesto con gli ultimi 6 messaggi
  const recentHistory = history.slice(-6)
    .map(m => (m.role === 'user' ? 'Cliente: ' : 'Bot: ') + m.content)
    .join('\n');

  const prompt = `Analizza questa conversazione tra un visitatore e l'assistente di ICCOM (provider internet e cybersecurity).

CONVERSAZIONE:
${recentHistory}

Rispondi SOLO con un JSON su una riga, niente altro:
{"business": true/false, "motivo": "breve spiegazione in italiano"}

business = true se il visitatore mostra interesse concreto per servizi aziendali, cybersecurity, connettività business, VoIP, cloud, o ha un problema IT — anche se non usa termini tecnici (es: "siamo stati bucati", "ho paura per i dati dei clienti", "la connessione in ufficio è lenta", "dobbiamo proteggere i dati", "lavoriamo in tanti da remoto").
business = false se è un privato con domande consumer o una chiacchierata generica.`;

  try {
    const resp = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 80,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!resp.ok) return;
    const data = await resp.json();
    const raw = (data.choices?.[0]?.message?.content || '').trim();

    // Parsing difensivo del JSON
    const jsonStart = raw.indexOf('{');
    const jsonEnd   = raw.lastIndexOf('}');
    if (jsonStart === -1 || jsonEnd === -1) return;

    const result = JSON.parse(raw.slice(jsonStart, jsonEnd + 1));

    if (result.business === true && !intentFired) {
      intentFired = true;
      sendToSheets('INTENTO', {
        nota: result.motivo || 'Intento business rilevato via AI',
        trigger: 'ai'
      });
      console.log('📡 [AI] Intento business rilevato:', result.motivo, '— IP:', visitorIp);
    }
  } catch(e) {
    // Silenzioso — il rilevamento AI è best-effort, non blocca nulla
    console.warn('checkIntentWithAI error:', e);
  }
}

// ══════════════════════════════════════════════════════
//  API CALL
// ══════════════════════════════════════════════════════
async function callClaude(userMsg, isInternal = false) {
  busy = true;
  document.getElementById('sbtn').disabled = true;

  history.push({ role: 'user', content: userMsg });
  showTyping();

  try {
    const resp = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 1000,
        messages: [
          { role: 'system', content: SYSTEM },
          ...history
        ]
      })
    });

    if (!resp.ok) {
      const err = await resp.json();
      hideTyping();
      addBot(`⚠️ Errore API: ${err.error?.message || resp.status}`);
      busy = false; document.getElementById('sbtn').disabled = false;
      return;
    }

    const data = await resp.json();
    const raw = data.choices?.[0]?.message?.content || '';

    // ── Parsing difensivo LEAD_DETECTED ──────────────────────────────────
    // Cerca il tag con o senza spazio, su qualsiasi riga, e rimuove tutto
    // il blocco dal testo visibile — anche se il JSON è malformato.
    let leadData = null;
    let clean = raw;

    const tagIndex = raw.search(/LEAD_DETECTED\s*:/i);
    if (tagIndex !== -1) {
      // Testo visibile = solo ciò che precede il tag
      clean = raw.slice(0, tagIndex).trim();

      // Estrai e parsa il JSON dopo il tag
      const afterTag = raw.slice(tagIndex).replace(/LEAD_DETECTED\s*:/i, '').trim();
      const jsonStart = afterTag.indexOf('{');
      const jsonEnd   = afterTag.lastIndexOf('}');
      if (jsonStart !== -1 && jsonEnd !== -1 && jsonEnd > jsonStart) {
        try {
          leadData = JSON.parse(afterTag.slice(jsonStart, jsonEnd + 1));
        } catch(e) {
          console.warn('LEAD_DETECTED JSON malformato — nascosto al cliente:', afterTag.slice(jsonStart, jsonEnd + 1));
        }
      }
    }

    // Natural delay: skip for first welcome message, apply for all subsequent replies
    if (!isInternal) {
      const typingDelay = Math.min(1000 + clean.length * 15, 2500);
      await new Promise(r => setTimeout(r, typingDelay));
    }

    hideTyping();
    if (clean) addBot(renderMd(clean));

    history.push({ role: 'assistant', content: clean || raw });

    // ── Rilevamento intento business (una sola volta per sessione) ─────────
    // Livello 1: keyword deterministiche (istantaneo, nessuna chiamata API)
    // Livello 2: valutazione AI (cattura sfumature e frasi implicite)
    if (!intentFired) {
      const triggerWords = ['cybersecurity','sicurezza informatica','sicurezza','firewall','ransomware','backup','protezione dati','infrastruttura','server','cloud','antivirus','attacco','vpn','rete aziendale','virus','hacker','hackerato','malware','connessione aziendale','rete','dati sensibili','dataset','gdpr','violazione','phishing','mail phishing','denial of service','dos','distributed denial of service','ddos','sql injection','exploit zero-day','exploit','man-in-the-middle','mitm','supply chain attack','cross-site scripting','xss','whaling','trojan','cavallo di troia','prompt injection','keylogger','iot','autenticazione a due fattori','cyberattacco','protezione','protezione avanzata','protezione rete','protezione infrastruttura'];
      const lastUserMsg = (history.filter(m => m.role === 'user').slice(-1)[0]?.content || '').toLowerCase();

      if (triggerWords.some(w => lastUserMsg.includes(w))) {
        // Livello 1: keyword trovata — notifica immediata
        intentFired = true;
        sendToSheets('INTENTO', { nota: 'Keyword business rilevata', trigger: 'keyword' });
        console.log('📡 [KEYWORD] Intento business rilevato — IP:', visitorIp);
      } else if (history.filter(m => m.role === 'user').length >= 2) {
        // Livello 2: dopo almeno 2 messaggi utente, chiedi all'AI di valutare l'intento
        // Gira in background — non blocca la conversazione
        checkIntentWithAI();
      }
    }

    if (leadData && !leadFired) {
      leadFired = true;
      handleLeadDetected(leadData);
    }

  } catch(e) {
    hideTyping();
    addBot('⚠️ Errore di connessione. Riprova tra qualche istante.');
  }

  busy = false;
  document.getElementById('sbtn').disabled = false;
  saveSession(); // persiste cronologia e stato dopo ogni risposta
}

function addUser(text) {

  d.innerHTML = `<div class="mav">👤</div><div class="bbl">${esc(text)}</div>`;

function showTyping() {
  const msgs = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = `<div class="mav">IC</div><div class="typing-bbl"><span></span><span></span><span></span></div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

function renderMd(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*<\/li>)/g, '<ul>$1</ul>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function send() {
  if (busy) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  addUser(text);
  await callClaude(text, false);
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}
function grow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 90) + 'px';
}

// Badge after 2s
setTimeout(() => { if (!started) document.getElementById('badge').style.display='flex'; }, 2000);
